# typos configuration
# https://github.com/crate-ci/typos

[default]
extend-ignore-identifiers-re = [
    # Company names
    "HashiCorp",
    "Hashi",
    # Mermaid diagram node IDs (e.g., K8SROLL, K8SGET)
    "K8S[A-Z]+",
]

[default.extend-words]
# French words used in documentation
projet = "projet"
# Legitimate code patterns
secur = "secur"
routeros = "routeros"
# BRE = Basic Regular Expression (grep regex flavor)
BRE = "BRE"

[files]
# Ignore generated files
extend-exclude = [
    "target/",
    "*.lock",
    "PLAN.md",
    # Internal French research/planning artifact — prose, not shipped docs
    "docs/feature-research-2026-06.md",
]
